<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BeautyBook – запись</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <link rel="stylesheet" href="/webapp/static/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/webapp/static/logo.png" alt="BeautyBook" id="logoImg" style="display:none;">
            <h1>BeautyBook</h1>
        </div>
        <div class="subtitle">Запись за 30 секунд</div>
        <form id="bookingForm">
            <div class="form-group">
                <label>👤 Ваше имя</label>
                <input type="text" name="name" placeholder="Анна" required>
            </div>
            <div class="form-group">
                <label>📞 Телефон</label>
                <input type="tel" name="phone" placeholder="+7 999 123-45-67" required>
            </div>
            <div class="form-group">
                <label>💅 Услуга</label>
                <select name="service" id="serviceSelect">
                    <option value="💅 Маникюр" data-price="2500">💅 Маникюр – 2500 ₽</option>
                    <option value="🦶 Педикюр" data-price="3500">🦶 Педикюр – 3500 ₽</option>
                    <option value="💆‍♀️ Спа-уход" data-price="4000">💆‍♀️ Спа-уход – 4000 ₽</option>
                </select>
            </div>
            <div class="form-group">
                <label>💇‍♀️ Мастер</label>
                <select name="master" required>
                    <option value="👩‍🦰 Анна">👩‍🦰 Анна</option>
                    <option value="👩 Елена">👩 Елена</option>
                    <option value="👩‍🦱 Наталья">👩‍🦱 Наталья</option>
                </select>
            </div>
            <div class="form-group">
                <label>📅 Дата и время</label>
                <input type="text" id="datetimePicker" name="datetime" placeholder="Выберите дату и время" required>
            </div>
            <div id="totalPrice" class="price">Стоимость: 0 ₽</div>
            <div id="formError" class="error-message"></div>
            <div class="progress-bar" id="progressBar" style="display:none;"><div class="progress-fill"></div></div>
            <div class="button-group">
                <button type="submit" id="submitBtn">✅ Записаться</button>
                <button type="button" id="resetBtn" class="btn-secondary">🗑 Очистить</button>
            </div>
        </form>
    </div>
    <script src="/webapp/static/script.js"></script>
</body>
</html>
